<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Farm Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #fcece9;
  color: #796c5e;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#utilityBar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 40px;
  background-color: #e2b098;
}

#utilityBar .brand {
  font-size: 20px;
  font-weight: bold;
  color: #9c6c51;
}

.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #fff;
  padding: 40px;
  border-radius: 15px;
  width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}

.login-box h2 {
  margin-bottom: 10px;
  color: #9c6c51;
}

.login-box p {
  font-size: 14px;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 15px;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background-color: #f7f3ed;
  outline: none;
}

.input-group input:focus {
  border-color: #cb7e5b;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background-color: #cb7e5b;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

.btn:hover {
  background-color: #9c6c51;
}

.btn-secondary {
  background-color: #fcece9;
  color: #cb7e5b;
  border: 1px solid #cb7e5b;
}

.btn-secondary:hover {
  background-color: #cb7e5b;
  color: white;
}

footer {
  background-color: #e2b098;
  text-align: center;
  padding: 15px;
  color: white;
}
</style>
</head>

<body>

    <div id="utilityBar">
        <div class="brand">D'Farm</div>
    </div>

    <div class="container">
        <div class="login-box">

        <h2>Welcome Back 🌱</h2>
        <p>Login to continue your eco-friendly shopping journey</p>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button class="btn" id="loginBtn">Login</button>
        <button class="btn btn-secondary" id="signupBtn">Sign Up</button>

        <p style="margin-top:15px; font-size:12px;">
            Or continue as guest 🌿
        </p>

        <button class="btn" id="guestBtn">Guest Login</button>

        <p id="message" style="margin-top:10px; font-size:12px;"></p>

        </div>
    </div>

<footer>
  © D'Farm — Soft on You, Gentle on Earth
</footer>

<script type="module">
  import firebaseConfig from "./firebaseConfig.js";

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInAnonymously,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const message = document.getElementById("message");

  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const guestBtn = document.getElementById("guestBtn");

  loginBtn.addEventListener("click", async () => {
    try {
      await signInWithEmailAndPassword(auth, email.value, password.value);
      message.innerText = "Login successful 🌱";
      window.location.href = "index.html";
    } catch (error) {
      message.innerText = error.message;
    }
  });

  signupBtn.addEventListener("click", async () => {
    try {
      await createUserWithEmailAndPassword(auth, email.value, password.value);
      message.innerText = "Account created 🌿";
    } catch (error) {
      message.innerText = error.message;
    }
  });

  guestBtn.addEventListener("click", async () => {
    try {
      await signInAnonymously(auth);
      window.location.href = "index.html";
    } catch (error) {
      message.innerText = error.message;
    }
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "index.html";
    }
  });
</script>

</body>
</html>
